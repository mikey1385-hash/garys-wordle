<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --color-correct: #6aaa64;
  --color-present: #c9b458;
  --color-absent: #787c7e;
  --color-bg: #ffffff;
  --color-tile-border: #d3d6da;
  --color-tile-border-filled: #878a8c;
  --color-text: #1a1a1b;
  --color-header-border: #d3d6da;
  --color-key-bg: #d3d6da;
  --color-key-text: #1a1a1b;
  --gap: 5px;
  --board-gap: 8px;
  --kb-gap: 8px;
}
html, body { height: 100%; }
body {
  font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  touch-action: manipulation;
}
header {
  width: 100%;
  max-width: 500px;
  border-bottom: 1px solid var(--color-header-border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 16px 4px;
  flex-shrink: 0;
}
@media (min-height: 700px) { header { padding: 10px 16px 6px; } header h1 { font-size: 2.2rem; } }
@media (min-height: 800px) { header { padding: 14px 16px 8px; } .birthday-banner { padding: 7px 16px; font-size: 14px; } header h1 { font-size: 2.4rem; } }
@media (min-height: 900px) { header { padding: 18px 16px 10px; } .birthday-banner { padding: 9px 16px; font-size: 15px; } header h1 { font-size: 2.6rem; } }
header h1 {
  font-family: 'Bitter', Georgia, serif;
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -0.01em;
  color: var(--color-text);
  line-height: 1;
}
.birthday-banner {
  width: 100%;
  max-width: 500px;
  background: linear-gradient(135deg, #6aaa64 0%, #5a9a54 100%);
  color: white;
  text-align: center;
  padding: 4px 16px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
#game-wrapper {
  flex: 1;
  min-height: 0;
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 10px;
  box-sizing: border-box;
  overflow: hidden;
}
.day-counter {
  font-size: 11px;
  color: #999;
  letter-spacing: 0.05em;
  width: 100%;
  max-width: 500px;
  text-align: center;
  padding: 6px 0 4px;
  flex-shrink: 0;
  background: var(--color-bg);
}
#board-area {
  flex: 1;
  min-height: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-bottom: 12px;
  box-sizing: border-box;
}
#board {
  display: flex;
  flex-direction: column;
  gap: var(--gap);
  flex-shrink: 0;
}
.row { display: flex; flex-direction: row; gap: var(--gap); }
.tile {
  border: 2px solid var(--color-tile-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--color-text);
  transition: border-color 0.1s;
  user-select: none;
}
.tile[data-letter] { border-color: var(--color-tile-border-filled); }
.tile.pop { animation: pop 0.1s ease; }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.12); } 100% { transform: scale(1); } }
.tile.shake { animation: shake 0.5s ease; }
@keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
.tile.flip { animation: flip 0.5s ease forwards; }
@keyframes flip { 0% { transform: rotateX(0); } 50% { transform: rotateX(-90deg); background: transparent; border-color: transparent; } 100% { transform: rotateX(0); } }
.tile[data-state="correct"] { background: var(--color-correct); border-color: var(--color-correct); color: white; }
.tile[data-state="present"] { background: var(--color-present); border-color: var(--color-present); color: white; }
.tile[data-state="absent"]  { background: var(--color-absent);  border-color: var(--color-absent);  color: white; }
#keyboard {
  width: 100%;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 0 0 max(env(safe-area-inset-bottom), 10px);
}
.key-row { display: flex; justify-content: center; gap: 5px; }
.key {
  height: 46px;
  min-width: 0;
  padding: 0;
  border: none;
  border-radius: 4px;
  background: var(--color-key-bg);
  color: var(--color-key-text);
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-transform: uppercase;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.1s;
}
.key.wide { max-width: 80px; font-size: 12px; flex: 2; }
.key.wide[data-key="⌫"] { font-size: 0; }
.key.wide[data-key="⌫"] svg { width: 20px; height: 20px; stroke: var(--color-key-text); }
.key[data-state="correct"] { background: var(--color-correct); color: white; }
.key[data-state="present"] { background: var(--color-present); color: white; }
.key[data-state="absent"]  { background: var(--color-absent);  color: white; }
.key:active { filter: brightness(0.9); }
#toast-container {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: #1a1a1b;
  color: white;
  padding: 10px 18px;
  border-radius: 4px;
  font-size: 14px;
  font-weight: 700;
  animation: fadeToast 1.8s ease forwards;
}
@keyframes fadeToast { 0% { opacity: 0; transform: translateY(-10px); } 15% { opacity: 1; transform: translateY(0); } 70% { opacity: 1; } 100% { opacity: 0; } }
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 500;
  padding: 16px;
}
.modal {
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 40px rgba(0,0,0,0.15);
  padding: 32px 24px;
  max-width: 380px;
  width: 100%;
  text-align: center;
}
.modal h2 { font-family: 'Archivo Black', 'Arial Black', sans-serif; font-size: 1.5rem; margin-top: 8px; margin-bottom: 8px; color: var(--color-text); }
.modal .answer-reveal { font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--color-correct); margin: 12px 0; }
.modal p { color: #555; font-size: 14px; line-height: 1.5; margin-bottom: 16px; }
.modal .word-meaning { background: #f6f7f8; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #444; margin-bottom: 20px; line-height: 1.5; text-align: left; }
.btn { background: var(--color-correct); color: white; border: none; border-radius: 4px; padding: 14px 28px; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.05em; width: 100%; font-family: inherit; }
.btn:hover { filter: brightness(0.95); }
.intro-emoji { font-size: 3rem; margin-bottom: 12px; }
.word-count-info { font-size: 12px; color: #999; margin-top: 6px; }
.photo-placeholder { width: 100px; height: 100px; border-radius: 50%; background: #f7da21; border: 3px solid var(--color-correct); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 16px; overflow: hidden; }
.photo-placeholder img { width: 100%; height: 100%; object-fit: cover; }
</style>

<script>
// STALE-CACHE SELF-CORRECTION
(function checkForStaleCache() {
  if (window.location.protocol === 'file:') return;
  const n = new Date();
  const stamp = `${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}`;
  const KEY = 'garys-wordle-day-stamp';
  let stored;
  try { stored = localStorage.getItem(KEY); } catch(e) {}
  if (stored && stored !== stamp) {
    try { localStorage.setItem(KEY, stamp); } catch(e) {}
    window.location.replace('/?d=' + stamp);
    return;
  }
  try { localStorage.setItem(KEY, stamp); } catch(e) {}
})();

const WORD_LIST = [
  { word: "SCOUT",  meaning: "🧭 Three days to go! Gary's always the first to explore somewhere new." },
  { word: "CANOE",  meaning: "🛶 Almost there! The big day is just around the river bend." },
  { word: "HAPPY",  meaning: "😊 One more sleep, Gary. Tomorrow you turn 70 — the family can't wait to celebrate you!" },
];

const validWords = WORD_LIST.filter(w => w.word.length === 5);

function getLocalDayIndex() {
  const now = new Date();
  const localMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const epoch = new Date(2026, 2, 7);
  const raw = Math.floor((localMidnight - epoch) / (1000 * 60 * 60 * 24));
  if (raw >= 0) {
    return raw % 70;
  } else {
    const countdownIndex = 70 + Math.max(raw + 3, 0);
    return Math.min(countdownIndex, 72);
  }
}

const dayIndex = getLocalDayIndex();
const todayEntry = validWords[dayIndex];
const TARGET  = todayEntry.word;
const MEANING = todayEntry.meaning;

const _d = new Date();
const todayDateStr = `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`;

let VALID_GUESSES = new Set(validWords.map(w => w.word));

fetch('https://raw.githubusercontent.com/tabatkins/wordle-list/main/words')
  .then(r => r.text())
  .then(text => {
    text.trim().split('\n').forEach(w => {
      const word = w.trim().toUpperCase();
      if (word.length === 5) VALID_GUESSES.add(word);
    });
  })
  .catch(() => console.warn('Extended word list unavailable.'));

const MAX_GUESSES = 6;
const WORD_LENGTH = 5;
const GAP = 5;

let currentRow = 0;
let currentCol = 0;
let currentGuess = [];
let gameOver = false;
let revealInProgress = false;

const SAVE_KEY = 'garys-wordle-state-v4';
['garys-wordle-state', 'garys-wordle-state-v1', 'garys-wordle-state-v2', 'garys-wordle-state-v3'].forEach(k => localStorage.removeItem(k));

function saveState() {
  const rowData = [];
  for (let r = 0; r < MAX_GUESSES; r++) {
    const row = [];
    for (let c = 0; c < WORD_LENGTH; c++) {
      const tile = tiles[r] && tiles[r][c];
      if (!tile) { row.push({ letter: '', state: '' }); continue; }
      row.push({ letter: tile.textContent || '', state: tile.dataset.state || '' });
    }
    rowData.push(row);
  }
  const keyStates = {};
  Object.entries(keyEl).forEach(([k, el]) => {
    if (el.dataset.state) keyStates[k] = el.dataset.state;
  });
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      date: todayDateStr, dayIndex, currentRow, gameOver, rowData, keyStates
    }));
  } catch(e) {}
}

function loadState() {
  let saved;
  try { saved = JSON.parse(localStorage.getItem(SAVE_KEY)); } catch(e) {}
  if (!saved || saved.date !== todayDateStr || saved.dayIndex !== dayIndex) {
    localStorage.removeItem(SAVE_KEY);
    return false;
  }
  saved.rowData.forEach((row, r) => {
    row.forEach(({ letter, state }, c) => {
      const tile = tiles[r] && tiles[r][c];
      if (!tile) return;
      if (letter) { tile.textContent = letter; tile.dataset.letter = letter; }
      if (state)  { tile.dataset.state = state; }
    });
  });
  Object.entries(saved.keyStates || {}).forEach(([k, state]) => {
    if (keyEl[k]) keyEl[k].dataset.state = state;
  });
  currentRow   = saved.currentRow || 0;
  currentCol   = 0;
  currentGuess = [];
  gameOver     = saved.gameOver || false;
  return true;
}

const boardEl = document.getElementById('board');
const tiles = [];
for (let r = 0; r < MAX_GUESSES; r++) {
  const rowEl = document.createElement('div');
  rowEl.className = 'row';
  const rowTiles = [];
  for (let c = 0; c < WORD_LENGTH; c++) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    rowEl.appendChild(tile);
    rowTiles.push(tile);
  }
  boardEl.appendChild(rowEl);
  tiles.push(rowTiles);
}

const KEYS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  [null,'A','S','D','F','G','H','J','K','L',null],
  ['ENTER','Z','X','C','V','B','N','M','⌫']
];
const keyEl = {};
const kb = document.getElementById('keyboard');
KEYS.forEach(row => {
  const rowEl = document.createElement('div');
  rowEl.className = 'key-row';
  row.forEach(k => {
    if (k === null) {
      const spacer = document.createElement('div');
      spacer.style.flex = '0.5';
      rowEl.appendChild(spacer);
      return;
    }
    const btn = document.createElement('button');
    btn.className = 'key' + (k.length > 1 || k === '⌫' ? ' wide' : '');
    btn.dataset.key = k;
    if (k === '⌫') {
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
