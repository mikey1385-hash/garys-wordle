<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gary's Wordle 🎂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Clear+Sans:wght@400;700&family=Bitter:wght@800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-correct: #6aaa64;
  --color-present: #c9b458;
  --color-absent: #787c7e;
  --color-bg: #ffffff;
  --color-tile-border: #d3d6da;
  --color-tile-border-filled: #878a8c;
  --color-text: #1a1a1b;
  --color-header-border: #d3d6da;
  --color-key-bg: #d3d6da;
  --color-key-text: #1a1a1b;
  --gap: 5px;
  --board-gap: 8px; /* gap between day-counter bottom and board top */
  --kb-gap: 8px;    /* gap between board bottom and keyboard top */
}

html, body {
  height: 100%;
}

body {
  font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  touch-action: manipulation;
}

/* HEADER */
header {
  width: 100%;
  max-width: 500px;
  border-bottom: 1px solid var(--color-header-border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 16px 4px;
  flex-shrink: 0;
}
.birthday-badge {
  font-size: 11px;
  letter-spacing: 0.1em;
  color: #6aaa64;
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 6px;
}
header h1 {
  font-family: 'Bitter', Georgia, serif;
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -0.01em;
  color: var(--color-text);
  line-height: 1;
}

/* BIRTHDAY BANNER */
.birthday-banner {
  width: 100%;
  max-width: 500px;
  background: linear-gradient(135deg, #6aaa64 0%, #5a9a54 100%);
  color: white;
  text-align: center;
  padding: 4px 16px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}

/* GAME WRAPPER — fills remaining space */
#game-wrapper {
  flex: 1;
  min-height: 0;
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 8px;
  overflow: hidden;
}

.day-counter {
  font-size: 11px;
  color: #999;
  letter-spacing: 0.05em;
  padding: 8px 0 0;
  flex-shrink: 0;
  height: 28px; /* fixed height so JS can measure reliably */
  display: flex;
  align-items: center;
}

/* BOARD — sized by JS */
#board {
  display: flex;
  flex-direction: column;
  gap: var(--gap);
  flex-shrink: 0;
  /* width + height set by JS */
}

.row {
  display: flex;
  flex-direction: row;
  gap: var(--gap);
  /* height set by JS */
}

.tile {
  border: 2px solid var(--color-tile-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--color-text);
  transition: border-color 0.1s;
  user-select: none;
  /* width + height + font-size set by JS */
}
.tile[data-letter] { border-color: var(--color-tile-border-filled); }
.tile.pop { animation: pop 0.1s ease; }
@keyframes pop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.12); }
  100% { transform: scale(1); }
}
.tile.shake { animation: shake 0.5s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}
.tile.flip { animation: flip 0.5s ease forwards; }
@keyframes flip {
  0%   { transform: rotateX(0); }
  50%  { transform: rotateX(-90deg); background: transparent; border-color: transparent; }
  100% { transform: rotateX(0); }
}
.tile[data-state="correct"] { background: var(--color-correct); border-color: var(--color-correct); color: white; }
.tile[data-state="present"] { background: var(--color-present); border-color: var(--color-present); color: white; }
.tile[data-state="absent"]  { background: var(--color-absent);  border-color: var(--color-absent);  color: white; }

/* SPACER between board and keyboard */
#board-kb-spacer {
  flex: 1;
  min-height: var(--kb-gap);
  max-height: 24px; /* cap it so keyboard stays visible */
}

/* KEYBOARD */
#keyboard {
  width: 100%;
  padding: 0 0 max(env(safe-area-inset-bottom), 8px);
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex-shrink: 0;
}
.key-row {
  display: flex;
  justify-content: center;
  gap: 6px;
}
.key {
  height: 52px;
  min-width: 0;
  padding: 0;
  border: none;
  border-radius: 4px;
  background: var(--color-key-bg);
  color: var(--color-key-text);
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  text-transform: uppercase;
  flex: 1;
  max-width: 43px;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.1s;
}
.key.wide {
  max-width: 80px;
  font-size: 13px;
  flex: 2;
}
.key.wide[data-key="⌫"] {
  font-size: 26px;
  font-weight: 300;
}
.key[data-state="correct"] { background: var(--color-correct); color: white; }
.key[data-state="present"] { background: var(--color-present); color: white; }
.key[data-state="absent"]  { background: var(--color-absent);  color: white; }
.key:active { filter: brightness(0.9); }

/* Short viewports */
@media (max-height: 600px) {
  .key { height: 44px; font-size: 13px; }
  .key.wide { font-size: 11px; }
  #keyboard { gap: 4px; }
  .key-row { gap: 5px; }
}

/* TOAST */
#toast-container {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: #1a1a1b;
  color: white;
  padding: 10px 18px;
  border-radius: 4px;
  font-size: 14px;
  font-weight: 700;
  animation: fadeToast 1.8s ease forwards;
}
@keyframes fadeToast {
  0%   { opacity: 0; transform: translateY(-10px); }
  15%  { opacity: 1; transform: translateY(0); }
  70%  { opacity: 1; }
  100% { opacity: 0; }
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 500;
  padding: 16px;
}
.modal {
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 40px rgba(0,0,0,0.15);
  padding: 32px 24px;
  max-width: 380px;
  width: 100%;
  text-align: center;
}
.modal h2 {
  font-family: 'Archivo Black', 'Arial Black', sans-serif;
  font-size: 1.5rem;
  margin-top: 8px;
  margin-bottom: 8px;
  color: var(--color-text);
}
.modal .answer-reveal {
  font-size: 1.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--color-correct);
  margin: 12px 0;
}
.modal p {
  color: #555;
  font-size: 14px;
  line-height: 1.5;
  margin-bottom: 16px;
}
.modal .word-meaning {
  background: #f6f7f8;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #444;
  margin-bottom: 20px;
  line-height: 1.5;
  text-align: left;
}
.btn {
  background: var(--color-correct);
  color: white;
  border: none;
  border-radius: 4px;
  padding: 14px 28px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
  width: 100%;
  font-family: inherit;
}
.btn:hover { filter: brightness(0.95); }

.intro-emoji { font-size: 3rem; margin-bottom: 12px; }
.word-count-info {
  font-size: 12px;
  color: #999;
  margin-top: 6px;
}
.photo-placeholder {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: #f7da21;
  border: 3px solid var(--color-correct);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  margin: 0 auto 16px;
  overflow: hidden;
}
.photo-placeholder img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

}

function loadState() {
  let saved;
  try { saved = JSON.parse(localStorage.getItem(SAVE_KEY)); } catch(e) {}
  if (!saved) return false;
  // Restore tiles instantly (no animation on reload)
  saved.rowData.forEach((row, r) => {
    row.forEach(({ letter, state }, c) => {
      const tile = tiles[r] && tiles[r][c];
      if (!tile) return;
      if (letter) { tile.textContent = letter; tile.dataset.letter = letter; }
      if (state)  { tile.dataset.state = state; }
    });
  });
  // Restore keyboard colours
  Object.entries(saved.keyStates || {}).forEach(([k, state]) => {
    if (keyEl[k]) keyEl[k].dataset.state = state;
  });
  currentRow   = saved.currentRow || 0;
  currentCol   = 0;
  currentGuess = [];
  gameOver     = saved.gameOver || false;
  return true;
}

// Build board
const boardEl = document.getElementById('board');
const tiles = [];
for (let r = 0; r < MAX_GUESSES; r++) {
  const rowEl = document.createElement('div');
  rowEl.className = 'row';
  const rowTiles = [];
  for (let c = 0; c < WORD_LENGTH; c++) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    rowEl.appendChild(tile);
    rowTiles.push(tile);
  }
  boardEl.appendChild(rowEl);
  tiles.push(rowTiles);
}

// Build keyboard
const KEYS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  [null,'A','S','D','F','G','H','J','K','L',null],
  ['ENTER','Z','X','C','V','B','N','M','⌫']
];
const keyEl = {};
const kb = document.getElementById('keyboard');
KEYS.forEach(row => {
  const rowEl = document.createElement('div');
  rowEl.className = 'key-row';
  row.forEach(k => {
    if (k === null) {
      const spacer = document.createElement('div');
      spacer.style.flex = '0.5';
      rowEl.appendChild(spacer);
      return;
    }
    const btn = document.createElement('button');
    btn.className = 'key' + (k.length > 1 || k === '⌫' ? ' wide' : '');
    btn.textContent = k;
    btn.dataset.key = k;
    btn.addEventListener('click', () => handleKey(k));
    rowEl.appendChild(btn);
    keyEl[k] = btn;
  });
  kb.appendChild(rowEl);
});

// Load saved state after board + keyboard are built
const hadSavedState = loadState();

document.getElementById('day-counter').textContent =
  `Word ${dayIndex + 1} of ${validWords.length} • ${today.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'})}`;

// ─── LAYOUT: make tiles square ─────────────────────────────────────────────
function resizeBoard() {
  const wrapper      = document.getElementById('game-wrapper');
  const dayCounter   = document.getElementById('day-counter');
  const kbEl         = document.getElementById('keyboard');
  const spacer       = document.getElementById('board-kb-spacer');

  // Temporarily hide spacer to measure natural heights
  spacer.style.display = 'none';

  const wrapperH     = wrapper.clientHeight;
  const dayH         = dayCounter.offsetHeight; // 28px fixed
  const kbH          = kbEl.offsetHeight;

  const BOARD_GAP_TOP = 8;   // gap after day counter
  const BOARD_GAP_BOT = 8;   // min gap before keyboard

  // Available height for the board
  const availH = wrapperH - dayH - kbH - BOARD_GAP_TOP - BOARD_GAP_BOT;

  // Total gaps inside board: (rows-1) row-gaps + (cols-1) col-gaps
  // Board height = 6*tileH + 5*GAP  → tileH = (availH - 5*GAP) / 6
  const tileFromH = Math.floor((availH - 5 * GAP) / MAX_GUESSES);

  // Available width for the board
  const wrapperW  = wrapper.clientWidth - 16; // 8px padding each side
  const maxBoardW = Math.min(wrapperW, 350);
  const tileFromW = Math.floor((maxBoardW - 4 * GAP) / WORD_LENGTH);

  // Tile size: whichever constraint is smaller, cap at 62px
  const tileSize = Math.min(tileFromH, tileFromW, 62);
  const fontSize = Math.max(Math.floor(tileSize * 0.42), 14);

  const boardW = WORD_LENGTH * tileSize + (WORD_LENGTH - 1) * GAP;
  const boardH = MAX_GUESSES * tileSize + (MAX_GUESSES - 1) * GAP;

  boardEl.style.width  = boardW + 'px';
  boardEl.style.height = boardH + 'px';

  // Size each row and tile explicitly
  const rowEls = boardEl.querySelectorAll('.row');
  rowEls.forEach(row => {
    row.style.height = tileSize + 'px';
    row.querySelectorAll('.tile').forEach(tile => {
      tile.style.width     = tileSize + 'px';
      tile.style.height    = tileSize + 'px';
      tile.style.fontSize  = fontSize + 'px';
      tile.style.flex      = 'none';
    });
  });

  // Restore spacer — it will flex-fill any remaining space
  spacer.style.display = '';
}

window.addEventListener('resize', resizeBoard);
// Run after fonts/layout settle
requestAnimationFrame(() => {
  requestAnimationFrame(resizeBoard);
  // If game was already finished, show end modal after a short delay
  if (hadSavedState && gameOver) {
    // Determine win: check if the last submitted row was all correct
    const lastRow = currentRow - 1;
    const won = lastRow >= 0 && tiles[lastRow] &&
      tiles[lastRow].every(t => t.dataset.state === 'correct');
    setTimeout(() => showEndModal(won), 600);
  }
});
// ────────────────────────────────────────────────────────────────────────────

function handleKey(key) {
  if (gameOver || revealInProgress) return;
  if (key === '⌫' || key === 'BACKSPACE') {
    deleteLetter();
  } else if (key === 'ENTER') {
    submitGuess();
  } else if (/^[A-Z]$/.test(key)) {
    addLetter(key);
  }
}

function addLetter(letter) {
  if (currentCol >= WORD_LENGTH) return;
  const tile = tiles[currentRow][currentCol];
  tile.textContent = letter;
  tile.dataset.letter = letter;
  tile.classList.add('pop');
  tile.addEventListener('animationend', () => tile.classList.remove('pop'), { once: true });
  currentGuess.push(letter);
  currentCol++;
}

function deleteLetter() {
  if (currentCol <= 0) return;
  currentCol--;
  currentGuess.pop();
  const tile = tiles[currentRow][currentCol];
  tile.textContent = '';
  delete tile.dataset.letter;
}

function clearCurrentRow() {
  for (let c = 0; c < WORD_LENGTH; c++) {
    const tile = tiles[currentRow][c];
    tile.textContent = '';
    delete tile.dataset.letter;
    tile.classList.remove('shake');
  }
  currentGuess = [];
  currentCol = 0;
}

function submitGuess() {
  if (currentCol < WORD_LENGTH) {
    shakeRow(currentRow);
    showToast("Not enough letters");
    setTimeout(() => clearCurrentRow(), 600);
    return;
  }
  const guess = currentGuess.join('');
  if (!VALID_GUESSES.has(guess)) {
    shakeRow(currentRow);
    showToast("Not in word list");
    setTimeout(() => clearCurrentRow(), 600);
    return;
  }
  revealRow(currentRow, guess);
}

function revealRow(rowIdx, guess) {
  revealInProgress = true;
  const result = evaluateGuess(guess);

  result.forEach((state, i) => {
    const tile = tiles[rowIdx][i];
    setTimeout(() => {
      tile.classList.add('flip');
      setTimeout(() => {
        tile.dataset.state = state;
        updateKeyState(guess[i], state);
      }, 250);
      tile.addEventListener('animationend', () => tile.classList.remove('flip'), { once: true });
    }, i * 300);
  });

  setTimeout(() => {
    revealInProgress = false;
    currentRow++;
    currentCol = 0;
    currentGuess = [];

    if (guess === TARGET) {
      gameOver = true;
      saveState();
      setTimeout(() => showEndModal(true), 400);
    } else if (currentRow >= MAX_GUESSES) {
      gameOver = true;
      saveState();
      setTimeout(() => showEndModal(false), 400);
    } else {
      saveState();
    }
  }, WORD_LENGTH * 300 + 300);
}

function evaluateGuess(guess) {
  const result    = Array(WORD_LENGTH).fill('absent');
  const targetArr = TARGET.split('');
  const guessArr  = guess.split('');

  guessArr.forEach((l, i) => {
    if (l === targetArr[i]) {
      result[i]    = 'correct';
      targetArr[i] = null;
      guessArr[i]  = null;
    }
  });

  guessArr.forEach((l, i) => {
    if (!l) return;
    const ti = targetArr.indexOf(l);
    if (ti !== -1) {
      result[i]    = 'present';
      targetArr[ti] = null;
    }
  });

  return result;
}

const STATE_PRIORITY = { correct: 3, present: 2, absent: 1 };
function updateKeyState(letter, state) {
  const el = keyEl[letter];
  if (!el) return;
  const current = el.dataset.state;
  if (!current || STATE_PRIORITY[state] > STATE_PRIORITY[current]) {
    el.dataset.state = state;
  }
}

function shakeRow(rowIdx) {
  tiles[rowIdx].forEach(t => {
    t.classList.add('shake');
    t.addEventListener('animationend', () => t.classList.remove('shake'), { once: true });
  });
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 1900);
}

function closeIntro() {
  document.getElementById('intro-modal').style.display = 'none';
  // Re-measure now that modal is gone (shouldn't affect layout but good practice)
  requestAnimationFrame(resizeBoard);
}

const WIN_MESSAGES = [
  "Genius! Gary is unstoppable! 🏆",
  "Gary is on FIRE! 🔥",
  "Magnificent! 🎉",
  "Impressive, Gary! ✨",
  "Great! Keep it up! 👏",
  "Phew! Got there! 😅"
];

function showEndModal(won) {
  const modal = document.getElementById('end-modal');
  document.getElementById('end-answer').textContent = TARGET;
  document.getElementById('end-meaning').textContent = MEANING;

  if (won) {
    document.getElementById('end-title').textContent = WIN_MESSAGES[Math.min(currentRow - 1, 5)];
    document.getElementById('end-message').textContent = "Another one down! Nadine, Jenna, and Lyndsey are cheering you on. 🐾❤️";
  } else {
    document.getElementById('end-title').textContent = "Nice try, Gary! 💪";
    document.getElementById('end-message').textContent = "Even the best puzzle people miss one sometimes. Tomorrow's a new word — and another chance to shine!";
  }
  modal.style.display = 'flex';
}

function closeEndModal() {
  document.getElementById('end-modal').style.display = 'none';
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.altKey || e.metaKey) return;
  const k = e.key.toUpperCase();
  if (k === 'BACKSPACE') handleKey('⌫');
  else if (k === 'ENTER') handleKey('ENTER');
  else if (/^[A-Z]$/.test(k)) handleKey(k);
});
</script>
